<app-section id="languages" title="Langues">
    <div class="flex flex-wrap justify-center gap-6">
        <div *ngFor="let language of languages"
            class="p-6 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 hover:border-[#fe66c4]/30 transition-all group hover:scale-105 text-center min-w-[150px]">
            <div class="text-4xl mb-3">{{ language.flag }}</div>
            <div class="font-semibold">{{ language.name }}</div>
            <div class="text-sm text-gray-400">{{ language.level }}</div>
        </div>
    </div>
</app-section>
