<app-section id="formation" title="Formation">
    <div class="grid md:grid-cols-3 gap-6">
        <div *ngFor="let formation of formations"
            class="p-6 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 hover:border-[#fe66c4]/30 transition-all group hover:scale-[1.02] text-center">
            <div class="text-4xl mb-4">🎓</div>
            <h3 class="text-lg font-semibold group-hover:text-[#fe66c4] transition-colors">
                {{ formation.title }}
            </h3>
            <p class="text-gray-400 text-sm mt-1">{{ formation.school }}</p>
            <p class="text-gray-500 text-sm">{{ formation.year }}</p>
            <p class="text-gray-500 text-xs mt-2">{{ formation.description }}</p>
        </div>
    </div>
</app-section>
