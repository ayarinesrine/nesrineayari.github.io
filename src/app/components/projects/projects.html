<app-section id="projects" title="Projets Réalisés">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let project of projects"
            class="group relative p-6 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 hover:border-[#fe66c4]/30 transition-all overflow-hidden hover:scale-[1.02]">
            <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br {{
            project.gradient
          }} opacity-10 rounded-full blur-3xl group-hover:opacity-30 transition-opacity"></div>
            <div class="relative z-10">
                <h3 class="text-xl font-semibold mb-3 group-hover:text-[#fe66c4] transition-colors">
                    {{ project.title }}
                </h3>
                <p class="text-gray-400 text-sm mb-4">{{ project.description }}</p>
                <div class="flex flex-wrap gap-2">
                    <span *ngFor="let tag of project.tags"
                        class="px-3 py-1 text-xs font-medium bg-white/5 border border-white/10 rounded-full text-gray-300 group-hover:border-[#fe66c4]/30 transition-colors">{{
                        tag }}</span>
                </div>
            </div>
        </div>
    </div>
</app-section>
