<!-- app.html -->
<div
  class="min-h-screen text-white overflow-x-hidden"
  [class.dark-mode]="theme.isDarkMode()"
  [class.light-mode]="!theme.isDarkMode()"
>
  <!-- ✅ Utilisation de #cursorRef pour ViewChild -->
  <app-smokey-cursor #cursorRef></app-smokey-cursor>

  <app-navigation></app-navigation>
  <router-outlet></router-outlet>

  <section id="home" class="section">
    <div class="container" @fadeInUp>
      <h1>Bienvenue</h1>
      <p>Déplacez votre souris pour voir l'effet fumée</p>

      <button (click)="toggleCursor()" class="toggle-btn">
        {{ cursorEnabled ? 'Désactiver' : 'Activer' }} le curseur
      </button>
    </div>
  </section>

  <app-footer></app-footer>
</div>
