<!-- src/app/app.html -->
<div
  class="min-h-screen text-white overflow-x-hidden"
  [class.dark-mode]="!isDarkMode"
  [class.light-mode]="isDarkMode"
>
  <!-- Navigation -->
  <nav
    class="fixed top-0 left-0 right-0 z-50 px-4 py-4 transition-all duration-300"
    [class.bg-black/80]="isScrolled && isDarkMode"
    [class.bg-white/80]="isScrolled && !isDarkMode"
    [class.backdrop-blur-xl]="isScrolled"
    [class.border-b]="isScrolled"
    [class.border-white/5]="isScrolled && isDarkMode"
    [class.border-gray-200/5]="isScrolled && !isDarkMode"
  >
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" (click)="scrollTo('#home')">
        <img
          class="w-28 m-auto h-auto"
          [src]="isDarkMode ? '/logo-light.png' : '/logo-dark.png'"
          alt="Logo"
        />
      </div>

      <div class="hidden md:flex items-center gap-8">
        <a
          *ngFor="let item of navItems"
          [href]="item.href"
          class="text-sm font-medium transition-all duration-300 hover:text-[#fe66c4] cursor-pointer relative"
          [class.text-[#fe66c4]]="activeSection === item.name.toLowerCase()"
          [class.text-gray-400]="activeSection !== item.name.toLowerCase()"
          (click)="scrollTo(item.href); $event.preventDefault()"
        >
          {{ item.name }}
          <span
            class="absolute -bottom-1 left-0 w-full h-0.5 bg-gradient-to-r from-[#fe66c4] to-[#7519e4] transition-all duration-300"
            [style.transform]="
              activeSection === item.name.toLowerCase() ? 'scaleX(1)' : 'scaleX(0)'
            "
          ></span>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-full hover:bg-white/10 transition-colors text-gray-400 hover:text-white"
          aria-label="Toggle theme"
        >
          {{ isDarkMode ? '🌙' : '☀️' }}
        </button>
        <button
          (click)="isMenuOpen = !isMenuOpen"
          class="md:hidden p-2 text-gray-400 hover:text-white transition-colors"
        >
          <svg
            *ngIf="!isMenuOpen"
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <svg
            *ngIf="isMenuOpen"
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>

    <div
      *ngIf="isMenuOpen"
      @fadeInUp
      class="md:hidden mt-4 bg-black/90 backdrop-blur-xl rounded-2xl p-4 border border-white/10"
    >
      <a
        *ngFor="let item of navItems"
        [href]="item.href"
        class="block py-3 px-4 text-gray-300 hover:text-[#fe66c4] hover:bg-white/5 rounded-xl transition-all cursor-pointer"
        (click)="scrollTo(item.href); $event.preventDefault()"
      >
        {{ item.name }}
      </a>
    </div>
  </nav>

  <app-hero></app-hero>
  <app-about></app-about>
  <app-skills></app-skills>
  <app-experience></app-experience>
  <app-formation></app-formation>
  <app-languages></app-languages>
  <app-projects></app-projects>
  <app-clients></app-clients>
  <app-contact></app-contact>
  <app-footer></app-footer>
</div>
